name: verify

# Runs the subset of `mise run verify` that's achievable on a standard GitHub-hosted
# runner. `complexity` (pretender) and `specs` (ah/espectacular) are intentionally
# excluded here — those binaries come from sibling tools that aren't published
# anywhere a CI runner can fetch them from (see cositos-dad.2 / TOOL_EVALUATION.md).
# Tracked as a follow-up: cositos-dad.19.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python + Node, pinned per mise.toml / .python-version
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: ".python-version"
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      # Julia (backend port)
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      # .NET (C# backend port)
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # R (backend port)
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - name: Install R dependencies
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'

      # Clojure (backend port) — needs a JVM first
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: "latest"

      - name: Install project dependencies (Python + JS)
        run: mise run setup

      # --- The achievable subset of `mise run verify` ---
      # (excludes `complexity` and `specs` — see header comment above)
      - run: mise run lint
      - run: mise run typecheck
      - run: mise run coverage
      - run: mise run front-typecheck
      - run: mise run front-coverage
      - run: mise run julia-test
      - run: mise run clojure-test
      - run: mise run r-test
      - run: mise run csharp-test
      - run: mise run coverage-audit
