# mise: pinned dev tools + task runner for cositos.
# Docs: https://mise.jdx.dev

[tools]
julia = { version = "1.11", checksum_expr = '"sha256:" + filter(fromJSON(body)[version + ""].files, { #.url == url })[0].sha256', checksum_url = "https://julialang-s3.julialang.org/bin/versions.json", platforms = { linux-arm64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/linux/aarch64/julia-latest-linuxaarch64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/linux/aarch64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-linux-aarch64.tar.gz{% endif %}""" }, linux-x64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/linux/x64/julia-latest-linux64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/linux/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-linux-x86_64.tar.gz{% endif %}""" }, macos-arm64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/mac/aarch64/julia-latest-macaarch64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/mac/aarch64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-macaarch64.tar.gz{% endif %}""" }, macos-x64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/mac/x64/julia-latest-mac64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/mac/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-mac64.tar.gz{% endif %}""" }, windows-x64 = { format = "zip", url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/winnt/x64/julia-latest-win64.zip{% else %}https://julialang-s3.julialang.org/bin/winnt/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-win64.zip{% endif %}""" } }, version_expr = 'sortVersions(filter(keys(fromJSON(body)), { # matches "^\\d+\\.\\d+\\.\\d+(-[0-9A-Za-z\\.-]+)?$" }))', version_list_url = "https://julialang-s3.julialang.org/bin/versions.json" }
# Python is managed by uv (.python-version); uv itself is provided by the system
# (Homebrew) because its GitHub release assets are blocked in this environment.
# mise pins node only.
node = "26"

[env]
# Keep locally-built suite tools (wai/dont/pretender/ah/lefthook) discoverable.
_.path = ["~/.local/bin"]
# .NET: locate the Homebrew SDK and keep CI runs quiet/non-interactive.
DOTNET_ROOT = "/opt/homebrew/opt/dotnet/libexec"
DOTNET_NOLOGO = "1"
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_GENERATE_ASPNET_CERTIFICATE = "false"

# --- Python (core) ---
[tasks.test]
description = "Run the Python test suite"
run = "uv run --extra dev --extra oracle pytest -m 'not e2e'"

[tasks.lint]
description = "Lint Python with ruff"
run = "uv run --extra dev ruff check src tests"

[tasks.fmt]
description = "Format Python with ruff"
run = "uv run --extra dev ruff format src tests"

[tasks.typecheck]
description = "Type-check Python with mypy --strict"
run = "uv run --extra dev mypy"

[tasks.coverage]
description = "Python tests with enforced coverage threshold"
run = "uv run --extra dev --extra oracle pytest -m 'not e2e' --cov=cositos --cov-report=term-missing --cov-fail-under=95"

[tasks.e2e]
description = "End-to-end test against a real Jupyter kernel (slow, opt-in)"
run = "uv run --extra dev --extra oracle --extra e2e pytest -m e2e -v"

[tasks.e2e-all]
description = "Run every per-language e2e example in isolation (OK/SKIP/FAIL summary; see examples/e2e/README.md)"
run = "python3 scripts/e2e_all.py"

[tasks.e2e-python]
description = "Python e2e example: reference emitter/checker for the cross-language contract (cositos-1wi.2)"
run = "uv run --extra dev python examples/e2e/python_e2e.py"

[tasks.e2e-clojure]
description = "Clojure e2e example: cross-language contract round-trip check (cositos-1wi.6)"
dir = "examples/e2e/clojure"
run = "clojure -M:dump"

[tasks.e2e-julia]
description = "Julia e2e example: cross-language contract round-trip check (cositos-1wi.3)"
run = "julia --project=examples/e2e/julia examples/e2e/julia/dump.jl"

[tasks.probe]
description = "Classify a kernel's widget-comm capability (Tier 1/2/3). Usage: mise run probe -- <kernel>"
run = "uv run --extra e2e --extra docs python probe/kernel_probe.py"

# --- JS (front) ---
[tasks.front-test]
description = "Run the frontend test suite"
dir = "front"
run = "node --test"

[tasks.front-typecheck]
description = "Type-check the frontend with tsc --checkJs"
dir = "front"
run = "npx tsc --noEmit"

[tasks.front-coverage]
description = "Frontend tests with enforced coverage threshold"
dir = "front"
run = "npm run coverage"

# --- Julia (backend port) ---
[tasks.julia-test]
description = "Run the Julia backend test suite (incl. fixture conformance)"
run = "julia --project=julia -e 'import Pkg; Pkg.test()'"

# --- Clojure (backend port) ---
[tasks.clojure-test]
description = "Run the Clojure backend core tests (fixture conformance)"
dir = "clojure"
run = "clojure -M:test"

# --- R (backend port) ---
[tasks.r-test]
description = "Run the R backend core tests (fixture conformance)"
dir = "r"
run = "Rscript test.R"

# --- C# (backend port) ---
[tasks.csharp-test]
description = "Run the C# backend core tests (fixture conformance)"
dir = "csharp"
run = "dotnet run -c Release"

# --- Cross-cutting ---
[tasks.complexity]
description = "Structural complexity gate (pretender)"
run = "pretender check src front/src"

[tasks.specs]
description = "Behavioural spec contracts (espectacular)"
run = "ah check"

[tasks.coverage-audit]
description = "Fail if a backend dir has no declared quality-tool coverage (see F19)"
run = "python3 scripts/coverage_audit.py"

[tasks.claims]
description = "Fail if any dont claim is unverified/ungrounded (see F1/E3, cositos-83x)"
run = "dont check --ungrounded"

[tasks.docs]
description = "Render the Quarto documentation site (needs quarto on PATH)"
run = [
    "uv sync --extra dev --extra docs",
    """QUARTO_PYTHON="$PWD/.venv/bin/python" quarto render docs/""",
]

[tasks.docs-preview]
description = "Live-preview the Quarto docs site"
run = '''QUARTO_PYTHON="$PWD/.venv/bin/python" quarto preview docs/'''

# --- Manual QA (human eyeball; the rendered paths tests can't fully judge) ---
[tasks.qa]
description = "Print the manual-QA checklist (which qa-* task exercises what)"
run = '''
echo "Manual QA — run each, then look for the described behaviour:"
echo "  mise run qa-export    open the checked-in static export (serialized state -> widget, no kernel; needs internet for CDN). Renders BLANK by design -- see the task description."
echo "  mise run qa-composition  open the checked-in composed-widget static export (VBox + two anywidget children actually render, no kernel)"
echo "  mise run qa-web        serve the backend-less browser demo (LocalChannel; interact -> live state, no kernel)"
echo "  mise run qa-docs       build + open the Quarto docs site (tutorials render; embedded widget shows statically)"
echo "  mise run qa-notebook   launch JupyterLab on the counter notebook (run cells, click increment, read state['count'] back)"
echo "  mise run qa-notebook-julia  same, for the Julia (IJulia) counter notebook (needs a Cositos-enabled IJulia kernel — see the notebook's prerequisites)"
'''

[tasks.qa-export]
description = '''
QA: open the checked-in static-HTML export (serialized Document -> widget, no kernel).
Expect a BLANK page -- this is intentional, not a bug (cositos-mbp): the two widgets'
`_esm` strings are reused verbatim from fixtures/widget-state.json, the cross-language
golden serialization fixture certified byte-for-byte against Python/Julia/R/C#/Clojure
test suites, so their render() bodies are comment-only placeholders ('/* VBox */',
'/* float32 plot */') by design -- editing them would ripple into every language port's
test fixtures. This task only confirms the export LOADS cleanly (requirejs + html-manager
+ anywidget CDN scripts 200, no console errors, no jupyter-widgets-error-widget). For a
static export that actually RENDERS something, use `mise run qa-composition`.
'''
run = "open examples/web/exported-widget-state.html"

[tasks.qa-composition]
description = "QA: open the checked-in composed-widget static export (VBox + two anywidget children, no kernel) -- the visual counterpart to qa-export"
run = "open examples/composition/vbox.html"

[tasks.qa-web]
description = "QA: serve the backend-less browser demo (LocalChannel, no kernel)"
# Must serve from the repo root, not examples/: examples/web/index.html imports the
# frontend via '../../front/src/index.js', which only resolves if front/ (a sibling of
# examples/ at the repo root) is inside the served tree (cositos-0e8).
run = [
    "echo 'Open http://localhost:8000/examples/web/  (Ctrl-C to stop)'",
    "python3 -m http.server 8000",
]

[tasks.qa-docs]
description = "QA: build + open the Quarto docs site"
depends = ["docs"]
run = "open docs/_site/index.html"

[tasks.qa-notebook]
description = "QA: launch JupyterLab on the live counter notebook (needs a kernel)"
run = "uv run --extra oracle --extra notebook jupyter lab examples/notebooks/python_counter.ipynb"

[tasks.qa-notebook-julia]
description = "QA: launch JupyterLab on the live Julia (IJulia) counter notebook (needs a Cositos-enabled IJulia kernel)"
run = "uv run --extra oracle --extra notebook jupyter lab examples/notebooks/julia_counter.ipynb"

[tasks.setup]
description = "Install all Python + JS dependencies"
run = ["uv sync --extra dev --extra oracle", "npm --prefix front install"]

[tasks.verify]
description = "Full local quality gate"
depends = [
    "lint",
    "typecheck",
    "coverage",
    "front-typecheck",
    "front-coverage",
    "julia-test",
    "clojure-test",
    "r-test",
    "csharp-test",
    "complexity",
    "coverage-audit",
    "specs",
    "claims",
]

# --- Release helpers ---
[tasks.bump-version]
description = "Bump the version everywhere. Usage: mise run bump-version X.Y.Z"
run = """
  version="$1"
  if [ -z "$version" ]; then
    echo "Usage: mise run bump-version X.Y.Z"
    exit 1
  fi
  uvx --from=tomli-w toml set pyproject.toml project.version "$version"
  npm version "$version" --no-git-tag-version --prefix front
  echo "Version bumped to $version in pyproject.toml and front/package.json"
  echo "Review the changes, then:"
  echo "  git add -p pyproject.toml front/package.json"
  echo "  git commit -m 'chore: bump version to $version'"
  echo "  git tag v$version"
"""

[tasks.release-dry-run]
description = "Dry-run the release: build packages, validate structure, no publish"
run = """
  echo "=== Python (PyPI) ==="
  uv build --quiet
  uv pip install --quiet dist/cositos-*.whl --force-reinstall
  echo "  OK: wheel installs cleanly"
  echo ""
  echo "=== JS (npm) ==="
  cd front && npm pack --dry-run 2>&1 | grep -E "^npm notice (package|total)" | head -5
  echo ""
  echo "Dry-run complete. Run 'git tag v...' to publish."
"""

# --- Binder container build ---
[tasks.binder-base]
description = "Build the Binder base image (all language runtimes + kernels)"
run = "docker build -f Dockerfile.binder-base -t cositos-binder-base ."

[tasks.binder-local]
description = "Build the Binder image from local source (no published GHCR image needed)"
run = "docker build -f Dockerfile.binder -t cositos-binder ."

[tasks.binder-serve]
description = "Serve the locally-built Binder image"
depends = ["binder-local"]
run = """
  docker run --rm -p 8888:8888 \
    -e JULIA_DEPOT_PATH=/opt/julia \
    cositos-binder \
    start-notebook.py \
      --IdentityProvider.token='' \
      --ServerApp.default_url=/lab/tree/examples/notebooks/python_counter.ipynb
"""

[tasks.binder-serve-clojure]
description = "Serve the Binder image with the Clojure counter notebook"
depends = ["binder-local"]
run = """
  docker run --rm -p 8888:8888 \
    -e JULIA_DEPOT_PATH=/opt/julia \
    cositos-binder \
    start-notebook.py \
      --IdentityProvider.token='' \
      --ServerApp.default_url=/lab/tree/examples/notebooks/clojure_counter.ipynb
"""

[tasks.binder-serve-julia]
description = "Serve the Binder image with the Julia counter notebook"
depends = ["binder-local"]
run = """
  docker run --rm -p 8888:8888 \
    -e JULIA_DEPOT_PATH=/opt/julia \
    cositos-binder \
    start-notebook.py \
      --IdentityProvider.token='' \
      --ServerApp.default_url=/lab/tree/examples/notebooks/julia_counter.ipynb
"""

[tasks.binder-url]
description = "Print the local Binder URL"
run = "echo http://localhost:8888"
