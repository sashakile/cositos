# mise: pinned dev tools + task runner for cositos.
# Docs: https://mise.jdx.dev

[tools]
julia = { version = "1.11", checksum_expr = '"sha256:" + filter(fromJSON(body)[version + ""].files, { #.url == url })[0].sha256', checksum_url = "https://julialang-s3.julialang.org/bin/versions.json", platforms = { linux-arm64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/linux/aarch64/julia-latest-linuxaarch64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/linux/aarch64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-linux-aarch64.tar.gz{% endif %}""" }, linux-x64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/linux/x64/julia-latest-linux64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/linux/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-linux-x86_64.tar.gz{% endif %}""" }, macos-arm64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/mac/aarch64/julia-latest-macaarch64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/mac/aarch64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-macaarch64.tar.gz{% endif %}""" }, macos-x64 = { url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/mac/x64/julia-latest-mac64.tar.gz{% else %}https://julialang-s3.julialang.org/bin/mac/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-mac64.tar.gz{% endif %}""" }, windows-x64 = { format = "zip", url = """{% if version == "nightly" %}https://julialangnightlies-s3.julialang.org/bin/winnt/x64/julia-latest-win64.zip{% else %}https://julialang-s3.julialang.org/bin/winnt/x64/{{ version | split(pat='.') | slice(start=0, end=2) | join(sep='.') }}/julia-{{ version }}-win64.zip{% endif %}""" } }, version_expr = 'sortVersions(filter(keys(fromJSON(body)), { # matches "^\\d+\\.\\d+\\.\\d+(-[0-9A-Za-z\\.-]+)?$" }))', version_list_url = "https://julialang-s3.julialang.org/bin/versions.json" }
# Python is managed by uv (.python-version); uv itself is provided by the system
# (Homebrew) because its GitHub release assets are blocked in this environment.
# mise pins node only.
node = "26"

[env]
# Keep locally-built suite tools (wai/dont/pretender/ah/lefthook) discoverable.
_.path = ["~/.local/bin"]
# .NET: locate the Homebrew SDK and keep CI runs quiet/non-interactive.
DOTNET_ROOT = "/opt/homebrew/opt/dotnet/libexec"
DOTNET_NOLOGO = "1"
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_GENERATE_ASPNET_CERTIFICATE = "false"

# --- Python (core) ---
[tasks.test]
description = "Run the Python test suite"
run = "uv run --extra dev --extra oracle pytest -m 'not e2e'"

[tasks.lint]
description = "Lint Python with ruff"
run = "uv run --extra dev ruff check src tests"

[tasks.fmt]
description = "Format Python with ruff"
run = "uv run --extra dev ruff format src tests"

[tasks.typecheck]
description = "Type-check Python with mypy --strict"
run = "uv run --extra dev mypy"

[tasks.coverage]
description = "Python tests with enforced coverage threshold"
run = "uv run --extra dev --extra oracle pytest -m 'not e2e' --cov=cositos --cov-report=term-missing --cov-fail-under=95"

[tasks.e2e]
description = "End-to-end test against a real Jupyter kernel (slow, opt-in)"
run = "uv run --extra dev --extra oracle --extra e2e pytest -m e2e -v"

[tasks.probe]
description = "Classify a kernel's widget-comm capability (Tier 1/2/3). Usage: mise run probe -- <kernel>"
run = "uv run --extra e2e --extra docs python probe/kernel_probe.py"

# --- JS (front) ---
[tasks.front-test]
description = "Run the frontend test suite"
dir = "front"
run = "node --test"

[tasks.front-typecheck]
description = "Type-check the frontend with tsc --checkJs"
dir = "front"
run = "npx tsc --noEmit"

[tasks.front-coverage]
description = "Frontend tests with enforced coverage threshold"
dir = "front"
run = "npm run coverage"

# --- Julia (backend port) ---
[tasks.julia-test]
description = "Run the Julia backend test suite (incl. fixture conformance)"
run = "julia --project=julia -e 'import Pkg; Pkg.test()'"

# --- Clojure (backend port) ---
[tasks.clojure-test]
description = "Run the Clojure backend core tests (fixture conformance)"
dir = "clojure"
run = "clojure -M:test"

# --- R (backend port) ---
[tasks.r-test]
description = "Run the R backend core tests (fixture conformance)"
dir = "r"
run = "Rscript test.R"

# --- C# (backend port) ---
[tasks.csharp-test]
description = "Run the C# backend core tests (fixture conformance)"
dir = "csharp"
run = "dotnet run -c Release"

# --- Cross-cutting ---
[tasks.complexity]
description = "Structural complexity gate (pretender)"
run = "pretender check src front/src"

[tasks.specs]
description = "Behavioural spec contracts (espectacular)"
run = "ah check"

[tasks.docs]
description = "Render the Quarto documentation site (needs quarto on PATH)"
run = [
    "uv sync --extra dev --extra docs",
    """QUARTO_PYTHON="$PWD/.venv/bin/python" quarto render docs/""",
]

[tasks.docs-preview]
description = "Live-preview the Quarto docs site"
run = '''QUARTO_PYTHON="$PWD/.venv/bin/python" quarto preview docs/'''

# --- Manual QA (human eyeball; the rendered paths tests can't fully judge) ---
[tasks.qa]
description = "Print the manual-QA checklist (which qa-* task exercises what)"
run = '''
echo "Manual QA — run each, then look for the described behaviour:"
echo "  mise run qa-export    open the checked-in static export (serialized state -> widget, no kernel; needs internet for CDN)"
echo "  mise run qa-web        serve the backend-less browser demo (LocalChannel; interact -> live state, no kernel)"
echo "  mise run qa-docs       build + open the Quarto docs site (tutorials render; embedded widget shows statically)"
echo "  mise run qa-notebook   launch JupyterLab on the counter notebook (run cells, click increment, read state['count'] back)"
'''

[tasks.qa-export]
description = "QA: open the checked-in static-HTML export (serialized Document -> widget, no kernel)"
run = "open examples/web/exported-widget-state.html"

[tasks.qa-web]
description = "QA: serve the backend-less browser demo (LocalChannel, no kernel)"
dir = "examples"
run = [
    "echo 'Open http://localhost:8000/web/  (Ctrl-C to stop)'",
    "python3 -m http.server 8000",
]

[tasks.qa-docs]
description = "QA: build + open the Quarto docs site"
depends = ["docs"]
run = "open docs/_site/index.html"

[tasks.qa-notebook]
description = "QA: launch JupyterLab on the live counter notebook (needs a kernel)"
run = "uv run --extra oracle --with jupyterlab jupyter lab examples/notebooks/python_counter.ipynb"

[tasks.setup]
description = "Install all Python + JS dependencies"
run = ["uv sync --extra dev --extra oracle", "npm --prefix front install"]

[tasks.verify]
description = "Full local quality gate"
depends = [
    "lint",
    "typecheck",
    "coverage",
    "front-typecheck",
    "front-coverage",
    "julia-test",
    "clojure-test",
    "r-test",
    "csharp-test",
    "complexity",
    "specs",
]
