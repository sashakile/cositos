# cositos git hooks (lefthook).
#
# Gate commands are defined once as mise tasks (see mise.toml); lefthook just invokes
# them so there is a single source of truth.
#
# NOTE: beads owns `core.hooksPath` (-> .beads/hooks) for its jsonl sync + typos/vale.
# The beads-managed pre-commit/pre-push delegate to `lefthook run <hook>` so both run.
# See docs/hooks.md.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.py"
      run: mise run lint
    format:
      glob: "*.py"
      run: uv run --extra dev ruff format --check src tests
    typecheck-py:
      glob: "src/**/*.py"
      run: mise run typecheck
    typecheck-js:
      glob: "front/src/**/*.js"
      run: mise run front-typecheck
    complexity:
      glob: "*.{py,js}"
      run: mise run complexity

pre-push:
  parallel: false
  commands:
    coverage-py:
      run: mise run coverage
    coverage-js:
      run: mise run front-coverage
    specs:
      run: mise run specs
