        text: Home
      - text: Tutorials
        menu:
          - tutorials/save-restore.qmd
          - tutorials/static-export.qmd
          - tutorials/polyglot-parity.qmd
      - text: Reference
        menu:
          - reference/index.qmd
          - reference/specs.qmd
      - text: Explanation
        menu:
          - explanation/architecture.qmd
          - explanation/state-discipline.qmd
      - text: Guides
        menu:
          - widgets.md
          - pluto.md
          - porting.md
          - hooks.md

format:
  html:
    theme: cosmo
    toc: true

