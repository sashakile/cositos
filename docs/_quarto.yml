project:
  type: website
  output-dir: _site
  # Vendors front/src/*.js (zero external deps) into docs/vendor/cositos-front/ before
  # every render, so the OJS tutorial (tutorials/web-ojs.qmd) can `import()` the real
  # @cositos/front runtime client-side. docs/vendor/ is gitignored and regenerated on
  # every build — never edit it by hand. See docs/prepare.sh.
  pre-render: ./prepare.sh
  resources:
    - vendor/**
  render:
    - index.qmd
    - status.md
    - tutorials/quickstart.qmd
    - tutorials/authoring-widgets.qmd
    - tutorials/integrating.qmd
    - tutorials/save-restore.qmd
    - tutorials/dashboard.qmd
    - tutorials/static-export.qmd
    - tutorials/polyglot-parity.qmd
    - tutorials/plot-integration.qmd
    - tutorials/web-ojs.qmd
    - reference/index.qmd
    - reference/specs.qmd
    - reference/api-cheatsheet.qmd
    - explanation/architecture.qmd
    - explanation/state-discipline.qmd
    - widgets.md
    - widgets-gallery.qmd
    - pluto.md
    - porting.md
    - hooks.md
    - hosts.md
    - _internal/bd-sync.md
    - _internal/publish-readiness-review-2026-07-07.md

website:
  title: "cositos"
  description: "A portable anywidget-inspired backend core for any Jupyter kernel language."
  site-url: https://sashakile.github.io/cositos/
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: status.md
        text: Status
      - text: Tutorials
        menu:
          - tutorials/quickstart.qmd
          - tutorials/authoring-widgets.qmd
          - tutorials/integrating.qmd
          - tutorials/save-restore.qmd
          - tutorials/dashboard.qmd
          - tutorials/static-export.qmd
          - tutorials/polyglot-parity.qmd
          - tutorials/plot-integration.qmd
          - tutorials/web-ojs.qmd
      - text: Reference
        menu:
          - reference/index.qmd
          - reference/specs.qmd
          - reference/api-cheatsheet.qmd
          - widgets-gallery.qmd
          - widgets.md
          - hosts.md
      - text: Explanation
        menu:
          - explanation/architecture.qmd
          - explanation/state-discipline.qmd
      - text: How-to Guides
        menu:
          - pluto.md
          - porting.md
          - hooks.md

format:
  html:
    theme: cosmo
    toc: true

# Render:  mise run docs   (sets QUARTO_PYTHON to the uv venv with the `docs` extra)
