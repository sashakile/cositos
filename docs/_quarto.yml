project:
  type: website
  output-dir: _site
  # Vendors front/src/*.js (zero external deps) into docs/vendor/cositos-front/ before
  # every render, so the OJS tutorial (using/web-ojs.qmd) can `import()` the real
  # @cositos/front runtime client-side. docs/vendor/ is gitignored and regenerated on
  # every build — never edit it by hand. See docs/prepare.sh.
  pre-render: ./prepare.sh
  resources:
    - vendor/**
  render:
    - index.qmd
    # Using cositos — for notebook authors
    - using/index.qmd
    - using/glossary.qmd
    - using/quickstart.qmd
    - using/authoring-widgets.qmd
    - using/integrating.qmd
    - using/save-restore.qmd
    - using/dashboard.qmd
    - using/static-export.qmd
    - using/plot-integration.qmd
    - using/web-ojs.qmd
    - using/api-reference.qmd
    - using/api-cheatsheet.qmd
    - using/widgets.md
    - using/widgets-gallery.qmd
    - using/hosts.md
    - using/pluto.md
    - using/state-discipline.qmd
    - using/status.md
    # Extending cositos — for backend porters & contributors
    - extending/index.qmd
    - extending/porting.md
    - extending/specs.qmd
    - extending/architecture.qmd
    - extending/polyglot-parity.qmd
    - extending/hooks.md
    - _internal/bd-sync.md
    - _internal/publish-readiness-review-2026-07-07.md

website:
  title: "cositos"
  description: "A portable anywidget-inspired backend core for any Jupyter kernel language."
  site-url: https://sashakile.github.io/cositos/
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Using cositos
        menu:
          - text: "Start here (notebook authors)"
            href: using/index.qmd
          - text: "Glossary — widget vocabulary"
            href: using/glossary.qmd
          - text: "---"
          - text: "Tutorials"
          - using/quickstart.qmd
          - using/authoring-widgets.qmd
          - using/integrating.qmd
          - using/save-restore.qmd
          - using/dashboard.qmd
          - using/static-export.qmd
          - using/plot-integration.qmd
          - using/web-ojs.qmd
          - text: "---"
          - text: "Reference"
          - using/api-reference.qmd
          - using/api-cheatsheet.qmd
          - using/widgets-gallery.qmd
          - using/widgets.md
          - using/hosts.md
          - using/status.md
          - text: "---"
          - text: "Explanation"
          - using/state-discipline.qmd
      - text: Extending cositos
        menu:
          - text: "Start here (porters & contributors)"
            href: extending/index.qmd
          - text: "---"
          - text: "How-to"
          - extending/porting.md
          - extending/hooks.md
          - text: "---"
          - text: "Reference"
          - extending/specs.qmd
          - text: "Explanation"
          - extending/architecture.qmd
          - extending/polyglot-parity.qmd

format:
  html:
    theme: cosmo
    toc: true

# Render:  mise run docs   (sets QUARTO_PYTHON to the uv venv with the `docs` extra)
