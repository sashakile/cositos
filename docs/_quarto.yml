project:
  type: website
  output-dir: _site
  # Pages are migrated into the site incrementally (Phase 2). Legacy docs/*.md are not
  # yet Quarto pages, so scope the render list to what's ready.
  render:
    - index.qmd

website:
  title: "cositos"
  description: "A portable anywidget-inspired backend core for any Jupyter kernel language."
  navbar:
    left:
      - href: index.qmd
        text: Home

format:
  html:
    theme: cosmo
    toc: true

# Python cells execute via the project's jupyter kernel. Point Quarto at the uv venv
# (which has ipykernel/jupyter) with:  QUARTO_PYTHON=.venv/bin/python quarto render docs/
